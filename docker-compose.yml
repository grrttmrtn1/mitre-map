services:
  mitremap:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: mitremap:latest
    container_name: mitremap
    restart: unless-stopped

    ports:
      - "${MITREMAP_PORT:-8443}:4000"

    environment:
      NODE_ENV: production
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CLIENT_URL: ${CLIENT_URL:-https://localhost:8443}
      APP_URL: ${APP_URL:-https://localhost:8443}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      # Optional: provide paths to your own TLS cert/key (PEM format).
      # If omitted, a self-signed certificate is generated at startup.
      SSL_CERT_PATH: ${SSL_CERT_PATH:-}
      SSL_KEY_PATH: ${SSL_KEY_PATH:-}
      # Optional: enterprise root CA for corporate environments.
      # Set to the in-container path of the cert and mount certs/ below.
      ENTERPRISE_CA_BUNDLE: ${ENTERPRISE_CA_BUNDLE:-}
      # Optional: PostgreSQL connection string. When set, SQLite is bypassed entirely.
      # Format: postgres://user:password@host:5432/dbname
      DATABASE_URL: ${DATABASE_URL:-}
      # Optional: connection pool tuning (PostgreSQL only).
      DB_POOL_MIN: ${DB_POOL_MIN:-2}
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      DB_POOL_IDLE_TIMEOUT: ${DB_POOL_IDLE_TIMEOUT:-30000}
      DB_POOL_ACQUIRE_TIMEOUT: ${DB_POOL_ACQUIRE_TIMEOUT:-30000}

    volumes:
      # Persist SQLite database across restarts/upgrades
      - mitremap-data:/app/server/data
      # Optional: mount a directory containing your TLS cert/key
      # - ./certs:/app/certs:ro
      # Optional: mount enterprise CA certs for runtime injection (no rebuild needed).
      # Set ENTERPRISE_CA_BUNDLE=/app/certs/enterprise-root-ca.crt in environment above.
      # - ./certs:/app/certs:ro

    healthcheck:
      test: ["CMD", "node", "-e", "require('https').get({hostname:'localhost',port:4000,path:'/api/health',rejectUnauthorized:false},r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mitremap-data:
    driver: local
